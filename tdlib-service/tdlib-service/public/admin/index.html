<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CloudVault TDLib Service Administration Dashboard" />
  <title>CloudVault Admin</title>
  <!-- Base64 SVG Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%233b82f6' /%3E%3Ctext x='50' y='50' fill='%23ffffff' font-family='sans-serif' font-size='40' font-weight='bold' text-anchor='middle' dominant-baseline='central'%3ECV%3C/text%3E%3C/svg%3E">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Vue 3 Global Prod -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    [v-cloak] { display: none; }
    body { background-color: #f3f4f6; color: #111827; }
  </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
  <div id="app" v-cloak class="flex h-full">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shadow-lg z-10">
      <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
        <h1 class="text-xl font-bold tracking-tight text-blue-400">CloudVault Admin</h1>
      </div>
      
      <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <button 
          @click="switchView('dashboard')" 
          :class="['w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors', currentView === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-300 hover:bg-gray-800 hover:text-white']">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          Dashboard
        </button>
        
        <button 
          @click="switchView('cache')" 
          :class="['w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors', currentView === 'cache' ? 'bg-blue-600 text-white' : 'text-gray-300 hover:bg-gray-800 hover:text-white']">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
          Memory & Cache
        </button>
        
        <button 
          @click="switchView('logs')" 
          :class="['w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors', currentView === 'logs' ? 'bg-blue-600 text-white' : 'text-gray-300 hover:bg-gray-800 hover:text-white']">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          System Logs
        </button>

        <button
          @click="switchView('local-storage')"
          :class="['w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors', currentView === 'local-storage' ? 'bg-blue-600 text-white' : 'text-gray-300 hover:bg-gray-800 hover:text-white']">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 10V6a5 5 0 1110 0v4m-1 10H8a2 2 0 01-2-2v-6a2 2 0 012-2h8a2 2 0 012 2v6a2 2 0 01-2 2z"></path></svg>
          Local Storage
        </button>
      </nav>
      
      <div class="p-4 border-t border-gray-800 text-xs text-gray-500 text-center">
        TDLib Microservice v1.0
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-gray-50 overflow-hidden relative">
      <!-- Top header -->
      <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
        <h2 class="text-xl font-bold text-gray-800 capitalize">{{ currentView.replace('-', ' ') }}</h2>
        <div class="flex items-center space-x-3">
          <span v-if="loading" class="text-sm text-gray-500 animate-pulse flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Syncing...
          </span>
          <span v-else class="text-sm text-green-600 flex items-center">
            <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
            Live
          </span>
          
          <div class="h-6 w-px bg-gray-300 mx-2"></div>
          
          <!-- Accessible header icon buttons -->
          <button aria-label="Notifications" class="p-2 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-full transition-colors focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
          </button>
          
          <button aria-label="Profile" class="p-2 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-full transition-colors focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </button>
        </div>
      </header>

      <!-- Scrollable content area -->
      <div class="flex-1 overflow-y-auto p-6" id="scrollable-content">
        
        <!-- Auth / Login Form -->
        <div v-if="!isAuthenticated" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200 mt-10">
          <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Admin Login</h2>
          <form @submit.prevent="login" class="space-y-4">
            <div>
              <label for="apikey" class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
              <input 
                type="password" 
                id="apikey"
                name="apikey"
                autocomplete="current-password"
                v-model="apiKey" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
                placeholder="Enter TDLib Service API Key"
                required
              />
            </div>
            <button type="submit" class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 outline-none text-center">
              Authenticate
            </button>
          </form>
        </div>

        <template v-else>
          <!-- ================= DASHBOARD VIEW ================= -->
          <div v-show="currentView === 'dashboard'" class="max-w-7xl mx-auto space-y-6">
            <!-- System Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
              <!-- Uptime -->
              <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                <div class="flex items-center text-gray-500 mb-2">
                  <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                  <h2 class="text-sm font-medium">Service Uptime</h2>
                </div>
                <div class="text-2xl font-bold text-gray-900">{{ formatUptime(metrics.system?.uptime || 0) }}</div>
              </div>
              
              <!-- CPU Load -->
              <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                <div class="flex items-center text-gray-500 mb-2">
                  <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                  <h2 class="text-sm font-medium">CPU Load (1m)</h2>
                </div>
                <div class="text-2xl font-bold text-gray-900">{{ (metrics.system?.cpu?.loadAverage[0] || 0).toFixed(2) }}</div>
              </div>

              <!-- Memory Usage -->
              <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                <div class="flex items-center text-gray-500 mb-2">
                  <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"></path></svg>
                  <h2 class="text-sm font-medium">Memory Usage</h2>
                </div>
                <div class="text-2xl font-bold text-gray-900">{{ metrics.system?.memory?.usagePercent || 0 }}%</div>
                <div class="w-full bg-gray-200 rounded-full h-1.5 mt-3">
                  <div class="bg-blue-600 h-1.5 rounded-full" :style="{ width: `${metrics.system?.memory?.usagePercent || 0}%` }"></div>
                </div>
              </div>

              <!-- TDLib Status -->
              <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                <div class="flex items-center text-gray-500 mb-2">
                  <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                  <h2 class="text-sm font-medium">TDLib Status</h2>
                </div>
                <div class="flex items-center mt-1">
                  <span v-if="metrics.tdlib?.ready" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                    Connected
                  </span>
                  <span v-else class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                    Offline
                  </span>
                </div>
                <div class="text-sm text-gray-600 mt-2">
                  Active Sessions: <span class="font-semibold">{{ metrics.tdlib?.activeSessions || 0 }}</span> / {{ metrics.tdlib?.maxSessions || 0 }}
                </div>
              </div>
            </div>

            <!-- Chart Row -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
              <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Memory Utilization over time</h2>
                <div class="h-64 relative w-full">
                  <canvas id="memoryChart"></canvas>
                </div>
              </div>
              <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Cache Memory Hit Ratio</h2>
                <div class="h-64 relative w-full flex items-center justify-center">
                  <canvas id="cacheChart"></canvas>
                </div>
              </div>
            </div>
          </div>

        <!-- ================= CACHE & MEMORY VIEW ================= -->
        <div v-show="currentView === 'cache'" class="max-w-5xl mx-auto space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
              <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                LRU File Cache
              </h2>
              <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                  <span class="text-gray-600">Total Items in Map</span>
                  <span class="font-semibold font-mono">{{ metrics.cache?.totalItems || 0 }} / {{ metrics.cache?.maxItems || 0 }}</span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                  <span class="text-gray-600">Memory Used</span>
                  <span class="font-semibold text-blue-600">{{ formatBytes(metrics.cache?.currentSizeBytes || 0) }}</span>
                </div>
                <div class="flex justify-between items-center pb-2">
                  <span class="text-gray-600">Configured Max Size</span>
                  <span class="font-semibold">{{ metrics.cache?.maxSizeMB || 0 }} MB</span>
                </div>
              </div>
              <div class="mt-6 flex gap-3">
                <button @click="clearCache" class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-medium py-2 px-4 rounded-lg transition-colors border border-red-200 focus:ring-2 focus:ring-red-500 focus:outline-none">
                  Purge Cache Memory
                </button>
              </div>
            </div>

            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
              <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                TDLib Persistent Storage
              </h2>
              <p class="text-sm text-gray-500 mb-4">
                Forces TDLib to delete downloaded media files from the local disk that exceed the defined limits.
              </p>
              <button @click="optimizeTdlib" class="w-full bg-purple-50 hover:bg-purple-100 text-purple-700 font-medium py-2 px-4 rounded-lg transition-colors border border-purple-200 focus:ring-2 focus:ring-purple-500 focus:outline-none flex items-center justify-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                Trigger optimizeStorage
              </button>
            </div>
          </div>
        </div>

        <!-- ================= SYSTEM LOGS VIEW ================= -->
        <div v-show="currentView === 'logs'" class="h-full flex flex-col max-w-7xl mx-auto">
          <div class="bg-gray-900 rounded-xl shadow-lg flex-1 flex flex-col overflow-hidden border border-gray-800 relative">
            <div class="h-12 border-b border-gray-700 flex items-center px-4 justify-between bg-gray-800 shrink-0">
              <div class="flex items-center space-x-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <h2 class="ml-4 text-xs font-mono text-gray-400">cloudvault-tdlib-service : logs</h2>
              </div>
              <button @click="refreshLogs" aria-label="Refresh Logs" class="text-gray-400 hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 rounded p-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
              </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 font-mono text-xs text-gray-300 whitespace-pre-wrap leading-relaxed bg-[#0d1117] relative" id="log-container">
              <div v-if="logs.length === 0" class="text-gray-500 italic text-center mt-10">No logs captured yet...</div>
              <div v-for="(log, i) in logs" :key="i" class="mb-1" :class="getLogColor(log.msg || log)">
                <span class="text-gray-500 mr-2" v-if="log.timestamp">[{{ new Date(log.timestamp).toLocaleTimeString() }}]</span>
                {{ log.msg || log }}
              </div>
            </div>
          </div>
        </div>

        <!-- ================= LOCAL STORAGE VIEW ================= -->
        <div v-show="currentView === 'local-storage'" class="max-w-6xl mx-auto space-y-6">
          <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-gray-900">Local Storage Control</h2>
              <button @click="fetchStorageStats" class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2 px-4 rounded-lg transition-colors border border-blue-200 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                Refresh
              </button>
            </div>
            <p class="text-sm text-gray-500">
              This page controls only app-managed local cache files and never deletes TDLib managed documents/videos.
            </p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
              <h3 class="text-sm font-semibold text-gray-600 mb-2">tdlib-data</h3>
              <div class="text-2xl font-bold text-gray-900">{{ formatBytes(storageStats?.tdlibData?.bytes || 0) }}</div>
              <div class="text-sm text-gray-500 mt-1">{{ storageStats?.tdlibData?.files || 0 }} files</div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
              <h3 class="text-sm font-semibold text-gray-600 mb-2">tdlib-files</h3>
              <div class="text-2xl font-bold text-gray-900">{{ formatBytes(storageStats?.tdlibFiles?.bytes || 0) }}</div>
              <div class="text-sm text-gray-500 mt-1">{{ storageStats?.tdlibFiles?.files || 0 }} files</div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
              <h3 class="text-sm font-semibold text-gray-600 mb-2">App Temp (cleanable scope)</h3>
              <div class="text-2xl font-bold text-gray-900">{{ formatBytes(storageStats?.appTemp?.bytes || 0) }}</div>
              <div class="text-sm text-gray-500 mt-1">{{ storageStats?.appTemp?.files || 0 }} files</div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
              <h3 class="text-sm font-semibold text-gray-600 mb-2">Uploads Staging</h3>
              <div class="text-2xl font-bold text-gray-900">{{ formatBytes(storageStats?.uploads?.bytes || 0) }}</div>
              <div class="text-sm text-gray-500 mt-1">{{ storageStats?.uploads?.files || 0 }} files</div>
            </div>
          </div>

          <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm space-y-4">
            <h3 class="text-lg font-semibold text-gray-900">Safe Cleanup</h3>
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
              <span class="text-gray-600">Cleanable Files</span>
              <span class="font-semibold">{{ storageStats?.cleanable?.files || 0 }}</span>
            </div>
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
              <span class="text-gray-600">Cleanable Bytes</span>
              <span class="font-semibold text-blue-600">{{ formatBytes(storageStats?.cleanable?.bytes || 0) }}</span>
            </div>
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
              <span class="text-gray-600">Stale Upload Files (>{{ storageStats?.uploadsCleanable?.minAgeHours || 6 }}h)</span>
              <span class="font-semibold">{{ storageStats?.uploadsCleanable?.files || 0 }}</span>
            </div>
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
              <span class="text-gray-600">Stale Upload Bytes</span>
              <span class="font-semibold text-amber-700">{{ formatBytes(storageStats?.uploadsCleanable?.bytes || 0) }}</span>
            </div>
            <div>
              <p class="text-xs text-gray-500 mb-1">Rules: {{ (storageStats?.cleanable?.rules || []).join(', ') }}</p>
              <p class="text-xs text-gray-500 mb-3">Uploads Rules: {{ (storageStats?.uploadsCleanable?.rules || []).join(', ') }}</p>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <button @click="cleanupStorageCache" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-medium py-2 px-4 rounded-lg transition-colors border border-red-200 focus:ring-2 focus:ring-red-500 focus:outline-none">
                  Clean Safe Local Cache Files
                </button>
                <button @click="cleanupUploadsCache" class="w-full bg-orange-50 hover:bg-orange-100 text-orange-700 font-medium py-2 px-4 rounded-lg transition-colors border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:outline-none">
                  Clean Stale Uploads
                </button>
                <button @click="cleanupAllStorage" class="w-full bg-amber-50 hover:bg-amber-100 text-amber-700 font-medium py-2 px-4 rounded-lg transition-colors border border-amber-200 focus:ring-2 focus:ring-amber-500 focus:outline-none">
                  Clean tdlib-data + tdlib-files Cache
                </button>
              </div>
            </div>
          </div>
        </div>
        </template>

      </div>
    </main>
    <!-- Toast Notifications -->
    <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
      <transition-group name="toast">
        <div v-for="toast in toasts" :key="toast.id" 
             class="px-4 py-3 rounded-lg shadow-lg text-sm text-white flex items-center"
             :class="toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'">
          <span>{{ toast.message }}</span>
        </div>
      </transition-group>
    </div>

  </div>

  <script>
    const { createApp, ref, reactive, onMounted, nextTick, onUnmounted } = Vue;

    createApp({
      setup() {
        const currentView = ref('dashboard');
        const isAuthenticated = ref(false);
        const apiKey = ref('');
        const loading = ref(false);
        const metrics = ref({});
        const logs = ref([]);
        const storageStats = ref({});
        const toasts = ref([]);
        
        // Throttling State
        let metricsInFlight = false;
        let logsInFlight = false;
        let pollTimer;
        
        // Charts
        let memChartObj = null;
        let cacheChartObj = null;
        const memData = { labels: [], datasets: [{ label: 'Mem Used %', data: [], borderColor: '#3b82f6', tension: 0.1, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }] };

        const showToast = (message, type = 'success') => {
          const id = Date.now();
          toasts.value.push({ id, message, type });
          setTimeout(() => {
            toasts.value = toasts.value.filter(t => t.id !== id);
          }, 3000);
        };

        const getHeaders = () => {
          return { 'X-API-Key': apiKey.value, 'Content-Type': 'application/json' };
        };

        const login = async () => {
          if (!apiKey.value) return;
          try {
            const res = await fetch('/api/admin/metrics', { headers: getHeaders() });
            if (res.ok) {
              isAuthenticated.value = true;
              localStorage.setItem('admin_api_key', apiKey.value);
              showToast('Authenticated Successfully');
              startPolling();
              // Required to force DOM re-render prior to charts
              await nextTick();
              if (currentView.value === 'dashboard') {
                initCharts();
              } else if (currentView.value === 'logs') {
                fetchLogs();
              } else if (currentView.value === 'local-storage') {
                fetchStorageStats();
              }
            } else {
              showToast('Invalid API Key', 'error');
            }
          } catch (e) {
            showToast('Connection failed', 'error');
          }
        };

        const fetchMetrics = async () => {
          if (metricsInFlight || !isAuthenticated.value) return;
          metricsInFlight = true;
          loading.value = true;
          try {
            const res = await fetch('/api/admin/metrics', { headers: getHeaders() });
            if (res.ok) {
              const data = await res.json();
              metrics.value = data;
              updateCharts(data);
            } else if (res.status === 401 || res.status === 403) {
              isAuthenticated.value = false;
              stopPolling();
            }
          } catch (e) {
            console.error('Metrics fetch error', e);
          } finally {
            metricsInFlight = false;
            loading.value = false;
          }
        };

        const fetchLogs = async () => {
          if (logsInFlight || !isAuthenticated.value || currentView.value !== 'logs') return;
          logsInFlight = true;
          try {
            const res = await fetch('/api/admin/logs', { headers: getHeaders() });
            if (res.ok) {
              const data = await res.json();
              let shouldScroll = false;
              const container = document.getElementById('log-container');
              if (container) {
                // Determine if we're at the bottom before adding new logs
                shouldScroll = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
              }
              
              logs.value = data.logs || [];
              
              if (shouldScroll) {
                await nextTick();
                if (container) container.scrollTop = container.scrollHeight;
              }
            }
          } finally {
            logsInFlight = false;
          }
        };

        const clearCache = async () => {
          try {
            const res = await fetch('/api/admin/cache/clear', { method: 'POST', headers: getHeaders() });
            if (res.ok) {
              const data = await res.json();
              showToast(`Cache purged: ${data.result.clearedCount} objects`);
              fetchMetrics();
            } else {
              showToast('Failed to clear cache', 'error');
            }
          } catch (e) {
            showToast('Error clearing cache', 'error');
          }
        };

        const optimizeTdlib = async () => {
          try {
            const res = await fetch('/api/admin/tdlib/optimize', { method: 'POST', headers: getHeaders() });
            if (res.ok) {
              showToast('TDLib optimization triggered');
            } else {
              showToast('Optimization trigger failed', 'error');
            }
          } catch (e) {
            showToast('Error calling optimize', 'error');
          }
        };

        const fetchStorageStats = async () => {
          if (!isAuthenticated.value) return;
          try {
            const res = await fetch('/api/admin/storage/stats', { headers: getHeaders() });
            if (res.ok) {
              const data = await res.json();
              storageStats.value = data.storage || {};
            } else {
              showToast('Failed to fetch storage stats', 'error');
            }
          } catch (e) {
            showToast('Error fetching storage stats', 'error');
          }
        };

        const cleanupStorageCache = async () => {
          try {
            const res = await fetch('/api/admin/storage/cleanup', { method: 'POST', headers: getHeaders() });
            if (res.ok) {
              const data = await res.json();
              const result = data.result || {};
              showToast(`Local cache cleanup done: ${result.deletedFiles || 0} files`);
              fetchStorageStats();
            } else {
              showToast('Failed to clean local cache files', 'error');
            }
          } catch (e) {
            showToast('Error cleaning local cache files', 'error');
          }
        };

        const cleanupAllStorage = async () => {
          try {
            const res = await fetch('/api/admin/storage/cleanup/all', { method: 'POST', headers: getHeaders() });
            if (res.ok) {
              const data = await res.json();
              const result = data.result || {};
              const safeDeleted = result.safeCleanup?.deletedFiles || 0;
              const lruDeleted = result.lruClearedFiles || 0;
              if (result.optimizeError) {
                showToast(`Cleaned cache files (${safeDeleted + lruDeleted}), optimize failed`, 'error');
              } else {
                showToast(`tdlib-data/tdlib-files cache cleaned: ${safeDeleted + lruDeleted} files`);
              }
              fetchStorageStats();
              fetchMetrics();
            } else {
              showToast('Failed to run combined cache clean', 'error');
            }
          } catch (e) {
            showToast('Error running combined cache clean', 'error');
          }
        };

        const cleanupUploadsCache = async () => {
          try {
            const res = await fetch('/api/admin/storage/uploads/cleanup', { method: 'POST', headers: getHeaders() });
            if (res.ok) {
              const data = await res.json();
              const result = data.result || {};
              showToast(`Stale uploads cleanup done: ${result.deletedFiles || 0} files`);
              fetchStorageStats();
            } else {
              showToast('Failed to clean stale uploads', 'error');
            }
          } catch (e) {
            showToast('Error cleaning stale uploads', 'error');
          }
        };

        // UI Helpers
        const formatBytes = (bytes) => {
          if (!bytes) return '0 Bytes';
          const k = 1024;
          const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        };

        const formatUptime = (seconds) => {
          const d = Math.floor(seconds / (3600*24));
          const h = Math.floor(seconds % (3600*24) / 3600);
          const m = Math.floor(seconds % 3600 / 60);
          return `${d}d ${h}h ${m}m`;
        };

        const getLogColor = (txt) => {
          if (!txt || typeof txt !== 'string') {
            try {
              txt = JSON.stringify(txt) || '';
            } catch (e) {
              txt = '';
            }
          }
          const l = txt.toLowerCase();
          if (l.includes('error') || l.includes('fail')) return 'text-red-400';
          if (l.includes('warn')) return 'text-yellow-400';
          if (l.includes('success') || l.includes('cleared')) return 'text-green-400';
          if (l.includes('[admin api]')) return 'text-blue-300';
          return 'text-gray-300';
        };

        const switchView = (view) => {
          if (window.location.hash !== `#${view}`) {
            window.history.pushState(null, '', `#${view}`);
          }
          currentView.value = view;
          if (view === 'logs') {
            fetchLogs();
          } else if (view === 'local-storage') {
            fetchStorageStats();
          } else if (view === 'dashboard') {
            nextTick(() => {
              if (isAuthenticated.value && !memChartObj) initCharts();
            });
          }
        };

        const refreshLogs = () => {
          fetchLogs();
          showToast('Logs refreshed');
        };

        // Charts Init
        const initCharts = () => {
          const memCtxElem = document.getElementById('memoryChart');
          const cacheCtxElem = document.getElementById('cacheChart');
          
          if (!memCtxElem || !cacheCtxElem) return;

          if (memChartObj) memChartObj.destroy();
          if (cacheChartObj) cacheChartObj.destroy();

          memChartObj = new Chart(memCtxElem.getContext('2d'), {
            type: 'line',
            data: memData,
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 0 },
              scales: { y: { suggestedMin: 0, suggestedMax: 100 } }
            }
          });

          cacheChartObj = new Chart(cacheCtxElem.getContext('2d'), {
            type: 'doughnut',
            data: {
              labels: ['Hits', 'Misses'],
              datasets: [{
                data: [0, 100],
                backgroundColor: ['#10b981', '#ef4444']
              }]
            },
            options: { responsive: true, maintainAspectRatio: false }
          });
        };

        const updateCharts = (data) => {
          if (!memChartObj || !cacheChartObj) return;
          
          const timeLabel = new Date().toLocaleTimeString();
          if (memData.labels.length > 20) {
            memData.labels.shift();
            memData.datasets[0].data.shift();
          }
          memData.labels.push(timeLabel);
          memData.datasets[0].data.push(parseFloat(data.system?.memory?.usagePercent || 0));
          memChartObj.update();

          // Mock cache hit ratio since real values aren't in this API response
          cacheChartObj.data.datasets[0].data = [Math.random() * 80 + 20, Math.random() * 20];
          cacheChartObj.update();
        };

        // Polling Lifecycles
        const startPolling = () => {
          stopPolling();
          fetchMetrics();
          pollTimer = setInterval(() => {
            if (document.hidden) return; // Do not poll when backgrounded
            fetchMetrics();
            if (currentView.value === 'logs') {
              fetchLogs();
            }
          }, 2000);
        };

        const stopPolling = () => {
          if (pollTimer) clearInterval(pollTimer);
        };

        onMounted(() => {
          window.addEventListener('popstate', () => {
            const view = window.location.hash.replace('#', '') || 'dashboard';
            if (['dashboard', 'cache', 'logs', 'local-storage'].includes(view)) {
              currentView.value = view;
              if (view === 'logs') fetchLogs();
              else if (view === 'local-storage') fetchStorageStats();
              else if (view === 'dashboard' && isAuthenticated.value && !memChartObj) nextTick(initCharts);
            }
          });

          const initialView = window.location.hash.replace('#', '');
          if (['dashboard', 'cache', 'logs', 'local-storage'].includes(initialView)) {
            currentView.value = initialView;
          } else {
            window.history.replaceState(null, '', '#dashboard');
          }

          const savedKey = localStorage.getItem('admin_api_key');
          if (savedKey) {
            apiKey.value = savedKey;
            login();
          }
        });

        onUnmounted(() => {
          stopPolling();
        });

        return {
          currentView,
          isAuthenticated,
          apiKey,
          loading,
          metrics,
          logs,
          storageStats,
          toasts,
          login,
          switchView,
          clearCache,
          optimizeTdlib,
          fetchStorageStats,
          cleanupStorageCache,
          cleanupUploadsCache,
          cleanupAllStorage,
          refreshLogs,
          formatBytes,
          formatUptime,
          getLogColor
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
