version: "2"
type: backend
tech_stack:
  - TypeScript
  - Express 4
  - Telegram TDLib (tdl + prebuilt-tdlib)
  - File-system cache and temp storage
features:
  - name: Health and Service Status
    description: Reports service health, TDLib readiness, session capacity, and uptime.
    files:
      - src/index.ts
      - src/session-manager.ts
    endpoints:
      - method: GET
        path: /health
        description: Returns service and TDLib health details.
        auth_required: false
        response_schema:
          "200":
            status: string
            tdlib_ready: boolean
            active_sessions: number
            max_sessions: number
            uptime: number
            timestamp: string
    depends_on:
      - TDLib session manager

  - name: File Upload API
    description: Supports small direct uploads and large chunked uploads to Telegram-backed storage.
    files:
      - src/routes/upload.ts
      - src/routes/chunked-upload.ts
      - src/middleware/auth.ts
    endpoints:
      - method: POST
        path: /api/upload/
        description: Uploads a single file (multipart/form-data).
        auth_required: true
      - method: POST
        path: /api/chunked-upload/init
        description: Initializes a chunked upload session.
        auth_required: false
      - method: POST
        path: /api/chunked-upload/chunk
        description: Uploads one chunk to an active upload session.
        auth_required: false
      - method: GET
        path: /api/chunked-upload/status
        description: Returns current chunked upload progress state.
        auth_required: false
      - method: POST
        path: /api/chunked-upload/complete-start
        description: Starts async chunk merge/finalization process.
        auth_required: true
      - method: GET
        path: /api/chunked-upload/complete-status
        description: Checks finalization job status.
        auth_required: true
      - method: GET
        path: /api/chunked-upload/complete-result
        description: Fetches finalization result and metadata.
        auth_required: true
      - method: POST
        path: /api/chunked-upload/complete
        description: Completes chunked upload in one request path.
        auth_required: true
    depends_on:
      - Telegram TDLib
      - Multer multipart handling
      - X-API-Key middleware

  - name: File Download and Repair API
    description: Downloads files via TDLib with cache, progressive/Range support, and fallback repair flows.
    files:
      - src/routes/download.ts
      - src/middleware/signed-url-auth.ts
      - src/utils/stream.ts
    endpoints:
      - method: GET
        path: /api/download/:remoteFileId
        description: Downloads or streams file bytes with optional Range support.
        auth_required: true
      - method: GET
        path: /api/dl/:remoteFileId
        description: Public signed-URL download route using HMAC validation.
        auth_required: false
      - method: GET
        path: /api/download/status/:remoteFileId
        description: Returns TDLib local download/cache status for a file.
        auth_required: true
      - method: POST
        path: /api/download/repair
        description: Repairs stale Telegram file references by forwarding messages.
        auth_required: true
    depends_on:
      - Telegram Bot API fallback
      - TDLib local file cache
      - Signed URL verification

  - name: Thumbnail, Delete, and Session Utilities
    description: Handles preview thumbnails, Telegram message deletion cleanup, and Telegram auth lifecycle.
    files:
      - src/routes/thumbnail.ts
      - src/routes/delete.ts
      - src/routes/telegram-auth.ts
    endpoints:
      - method: GET
        path: /api/thumbnail/:remoteFileId
        description: Retrieves thumbnail bytes for a Telegram-backed file.
        auth_required: true
      - method: POST
        path: /api/thumbnail/from-message
        description: Builds a thumbnail from Telegram message content.
        auth_required: true
      - method: DELETE
        path: /api/message/:chatId/:messageId
        description: Deletes a Telegram message for content cleanup.
        auth_required: true
      - method: POST
        path: /api/message/cleanup
        description: Performs cleanup operations for message/file artifacts.
        auth_required: true
      - method: POST
        path: /api/telegram/send-code
        description: Initiates Telegram login by sending verification code.
        auth_required: true
      - method: POST
        path: /api/telegram/verify-code
        description: Verifies Telegram login code.
        auth_required: true
      - method: POST
        path: /api/telegram/verify-password
        description: Verifies Telegram 2FA password when required.
        auth_required: true
      - method: GET
        path: /api/telegram/status/:userId
        description: Reports Telegram auth/session status for a user.
        auth_required: true
      - method: POST
        path: /api/telegram/disconnect
        description: Disconnects and removes Telegram session state.
        auth_required: true
    depends_on:
      - TDLib session manager
      - Telegram auth state machine

  - name: Admin and Diagnostics API
    description: Exposes storage metrics and maintenance actions.
    files:
      - src/routes/admin.ts
      - public/admin/index.html
    endpoints:
      - method: GET
        path: /api/admin/storage/stats
        description: Returns storage and cache usage stats.
        auth_required: true
      - method: POST
        path: /api/admin/storage/cleanup
        description: Triggers targeted storage cleanup.
        auth_required: true
      - method: POST
        path: /api/admin/storage/uploads/cleanup
        description: Cleans stale upload artifacts.
        auth_required: true
      - method: POST
        path: /api/admin/storage/cleanup/all
        description: Runs full storage cleanup workflow.
        auth_required: true
      - method: GET
        path: /api/admin/metrics
        description: Returns runtime metrics for diagnostics.
        auth_required: true
      - method: POST
        path: /api/admin/cache/clear
        description: Clears in-process application cache.
        auth_required: true
      - method: POST
        path: /api/admin/tdlib/optimize
        description: Triggers TDLib optimizeStorage operation.
        auth_required: true
      - method: GET
        path: /api/admin/logs
        description: Retrieves recent logs for troubleshooting.
        auth_required: true
    depends_on:
      - In-process cache
      - TDLib optimizeStorage
      - Auth middleware
known_limitations:
  - issue: Separate concurrency limiters in single upload and chunked upload paths are not unified.
    location: src/routes/upload.ts
    impact: Throughput control may be inconsistent under mixed upload workloads.
  - issue: Upload deduplication is name-based and not content-hash enforced server-side.
    location: src/routes/upload.ts
    impact: Duplicate content can be stored when filenames differ.
  - issue: Chunked upload session state is kept in memory only.
    location: src/routes/chunked-upload.ts
    impact: In-progress uploads are lost on service restart.
  - issue: Thumbnail extraction can require full file download in certain flows.
    location: src/routes/thumbnail.ts
    impact: Increased latency and bandwidth usage for preview requests.
